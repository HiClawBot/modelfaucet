services:
  postgres:
    image: postgres:16
    container_name: modelfaucet-postgres
    environment:
      POSTGRES_USER: modelfaucet
      POSTGRES_PASSWORD: modelfaucet
      POSTGRES_DB: modelfaucet
    ports:
      - "5432:5432"
    volumes:
      - modelfaucet_pg:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/0001_schema.sql:ro
      - ./infra/db/seed.sql:/docker-entrypoint-initdb.d/0002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelfaucet -d modelfaucet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: modelfaucet-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: modelfaucet-litellm
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-dev-master-key}
      MOCK_PROVIDER_API_KEY: ${MOCK_PROVIDER_API_KEY:-sk-test-local-mock-provider-key}
      MOCK_OPENAI_BASE_URL: http://mock-provider:4010/v1
      DATABASE_URL: postgresql://modelfaucet:modelfaucet@postgres:5432/modelfaucet
    volumes:
      - ./infra/docker/litellm.smoke.config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    depends_on:
      postgres:
        condition: service_healthy
      mock-provider:
        condition: service_healthy

  mock-provider:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
    container_name: modelfaucet-mock-provider
    command: ["node", "scripts/mock-openai-compatible.mjs"]
    environment:
      PORT: 4010
      HOST: 0.0.0.0
    ports:
      - "4010:4010"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
    container_name: modelfaucet-api
    command: ["pnpm", "--filter", "@modelfaucet/api", "dev"]
    environment:
      NODE_ENV: development
      PORT_API: 3001
      DATABASE_URL: postgresql://modelfaucet:modelfaucet@postgres:5432/modelfaucet
      GATEWAY_BASE_URL: http://gateway:3002/v1
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-dev_32_bytes_replace_me_replace_me}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-mf_admin_dev}
      DEVELOPER_ADMIN_TOKEN: ${DEVELOPER_ADMIN_TOKEN:-mf_admin_dev}
      SESSION_TOKEN_TTL_SECONDS: ${SESSION_TOKEN_TTL_SECONDS:-3600}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PAYOUT_THRESHOLD_USD: ${PAYOUT_THRESHOLD_USD:-1.00000000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
    container_name: modelfaucet-gateway
    command: ["pnpm", "--filter", "@modelfaucet/gateway", "dev"]
    environment:
      NODE_ENV: development
      PORT_GATEWAY: 3002
      DATABASE_URL: postgresql://modelfaucet:modelfaucet@postgres:5432/modelfaucet
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-test-litellm-master-key}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-dev_32_bytes_replace_me_replace_me}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      mock-provider:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
    container_name: modelfaucet-dashboard
    command:
      [
        "pnpm",
        "--filter",
        "@modelfaucet/dashboard",
        "exec",
        "vite",
        "--host",
        "0.0.0.0",
        "--port",
        "5173"
      ]
    environment:
      VITE_MODELFAUCET_API_BASE_URL: http://localhost:3001
      VITE_MODELFAUCET_DEVELOPER_ADMIN_TOKEN: ${DEVELOPER_ADMIN_TOKEN:-mf_admin_dev}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  crm-demo:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
    container_name: modelfaucet-crm-demo
    command:
      [
        "pnpm",
        "--filter",
        "crm-demo",
        "exec",
        "vite",
        "--host",
        "0.0.0.0",
        "--port",
        "5174"
      ]
    environment:
      VITE_MODELFAUCET_API_BASE_URL: http://localhost:3001
      VITE_MODELFAUCET_GATEWAY_BASE_URL: http://localhost:3002/v1
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_healthy
      gateway:
        condition: service_healthy

volumes:
  modelfaucet_pg:
