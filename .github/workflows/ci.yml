name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://modelfaucet:modelfaucet@localhost:5432/modelfaucet

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: modelfaucet
          POSTGRES_PASSWORD: modelfaucet
          POSTGRES_DB: modelfaucet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U modelfaucet -d modelfaucet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.0.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/local-bridge/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify secrets
        run: pnpm verify:secrets

      - name: Verify database schema and seed
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build dashboard
        run: pnpm --filter @modelfaucet/dashboard build

      - name: Build CRM demo
        run: pnpm --filter crm-demo build

      - name: Build docs site
        run: pnpm docs:build
