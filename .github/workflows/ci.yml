name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://modelfaucet:modelfaucet@localhost:5432/modelfaucet

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: modelfaucet
          POSTGRES_PASSWORD: modelfaucet
          POSTGRES_DB: modelfaucet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U modelfaucet -d modelfaucet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: "9.0.0"

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: services/local-bridge/go.mod
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify secrets
        run: pnpm verify:secrets

      - name: Verify GA readiness
        run: pnpm ga:verify

      - name: Verify hosted environment contract
        env:
          NODE_ENV: production
          HOSTED_ENVIRONMENT: ci
          HOSTED_SECRET_MANAGER: ci-secret-manager
          DATABASE_URL: postgresql://modelfaucet:modelfaucet@db.modelfaucet.invalid:5432/modelfaucet
          SECRET_ENCRYPTION_KEY: mf_ci_secret_encryption_key_32_bytes_minimum
          ADMIN_TOKEN: mf_ci_admin_token_for_hosted_env_check
          DEVELOPER_ADMIN_TOKEN: mf_ci_developer_admin_token_check
          LITELLM_BASE_URL: https://litellm.modelfaucet.invalid
          LITELLM_MASTER_KEY: mf_ci_litellm_master_key_for_hosted_check
          API_CORS_ORIGINS: https://dashboard.modelfaucet.invalid
          GATEWAY_CORS_ORIGINS: https://crm-demo.modelfaucet.invalid
          API_PUBLIC_BASE_URL: https://api.modelfaucet.invalid
          GATEWAY_PUBLIC_BASE_URL: https://gateway.modelfaucet.invalid/v1
          DASHBOARD_PUBLIC_BASE_URL: https://dashboard.modelfaucet.invalid
          PUBLIC_SUPPORT_URL: https://support.modelfaucet.invalid
          SECURITY_CONTACT_EMAIL: security@modelfaucet.invalid
          ABUSE_CONTACT_EMAIL: abuse@modelfaucet.invalid
          INCIDENT_CONTACT_EMAIL: incident@modelfaucet.invalid
        run: pnpm hosted:verify-env

      - name: Dependency audit
        run: pnpm security:audit

      - name: Verify database schema and seed
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Hosted tenant isolation check
        run: pnpm hosted:check-isolation

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Local stack smoke test
        env:
          SECRET_ENCRYPTION_KEY: dev_32_bytes_replace_me_replace_me
          LITELLM_MASTER_KEY: sk-test-litellm-master-key
        run: pnpm smoke:local

      - name: Validate Docker Compose configs
        run: pnpm compose:verify

      - name: Build dashboard
        run: pnpm --filter @modelfaucet/dashboard build

      - name: Build CRM demo
        run: pnpm --filter crm-demo build

      - name: Build website
        run: pnpm website:build

      - name: Build docs site
        run: pnpm docs:build

      - name: Build Pages artifact
        run: pnpm pages:build
