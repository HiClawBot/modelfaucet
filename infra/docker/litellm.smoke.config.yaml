model_list:
  - model_name: auto-text
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/MOCK_PROVIDER_API_KEY
      api_base: os.environ/MOCK_OPENAI_BASE_URL

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
  set_verbose: false

